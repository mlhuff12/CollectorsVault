name: "Infrastructure"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    if: env.RUN_INFRA == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.0"

      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap backend resources
        if: env.SKIP_BACKEND_BOOTSTRAP != 'true'
        uses: azure/CLI@v1
        with:
          azcliversion: 'latest'
          inlineScript: |
            # ensure RG/SA/container exist before terraform tries to use them
            cd infra/scripts
            ./bootstrap-backend.ps1
        env:
          TF_STATE_RG: ${{ secrets.TF_STATE_RG }}
          TF_STATE_SA: ${{ secrets.TF_STATE_SA }}
          TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
          SKIP_BACKEND_BOOTSTRAP: ${{ env.SKIP_BACKEND_BOOTSTRAP }}
          RUN_INFRA: ${{ env.RUN_INFRA }}

      - name: Initialise backend
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}"

      - name: Terraform plan
        working-directory: infra
        run: terraform plan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && env.RUN_TF_APPLY == 'true'
        working-directory: infra
        run: terraform apply -auto-approve

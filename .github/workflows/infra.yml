name: "Infrastructure"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    if: vars.RUN_INFRA == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.0"

      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap backend resources
        if: vars.SKIP_BACKEND_BOOTSTRAP != 'true'
        shell: pwsh
        run: infra/scripts/bootstrap-backend.ps1
        env:
          TF_STATE_RG: ${{ secrets.TF_STATE_RG }}
          TF_STATE_SA: ${{ secrets.TF_STATE_SA }}
          TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
          SKIP_BACKEND_BOOTSTRAP: ${{ vars.SKIP_BACKEND_BOOTSTRAP }}
          RUN_INFRA: ${{ vars.RUN_INFRA }}

      - name: Initialise backend
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}"

      - name: Terraform plan
        working-directory: infra
        env:
          TF_VAR_sql_admin_login: ${{ secrets.SQL_ADMIN_LOGIN }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: terraform plan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && vars.RUN_TF_APPLY == 'true'
        working-directory: infra
        env:
          TF_VAR_sql_admin_login: ${{ secrets.SQL_ADMIN_LOGIN }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: terraform apply -auto-approve

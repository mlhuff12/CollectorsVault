name: API CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-api-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect API-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'server/**'
              - 'tests/**'
              - 'scripts/check-unit-test-style.py'
              - 'CollectorsVault.sln'
              - '.github/workflows/api-ci.yml'

  api-build-and-unit-tests:
    needs: detect-api-changes
    if: needs.detect-api-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build API and Test Projects
        run: dotnet build CollectorsVault.sln --configuration Release

      - name: Run API Unit Tests
        run: dotnet test tests/CollectorsVault.Api.Tests/CollectorsVault.Api.Tests.csproj --configuration Release --filter "Category=Unit"

  api-not-applicable:
    needs: detect-api-changes
    if: needs.detect-api-changes.outputs.api != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip API CI when no API changes
        run: echo "No API-related changes detected. Skipping API build/tests."

  api-unit-test-style:
    needs: detect-api-changes
    if: needs.detect-api-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check unit test naming and AAA comment patterns
        run: python3 scripts/check-unit-test-style.py

  api-ci-gate:
    needs:
      - api-build-and-unit-tests
      - api-unit-test-style
      - api-not-applicable
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Final required gate
        run: |
          echo "API CI gate completed."
          echo "build_and_tests_result=${{ needs.api-build-and-unit-tests.result }}"
          echo "unit_test_style_result=${{ needs.api-unit-test-style.result }}"
          echo "not_applicable_result=${{ needs.api-not-applicable.result }}"
